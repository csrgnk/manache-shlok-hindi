<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manache Shlok - Telugu Version</title>

  <script type="text/javascript">
    /* 1. SECURITY CONTROLS */
    document.addEventListener('contextmenu', event => event.preventDefault());

    document.onkeydown = function(e) {
        if (e.ctrlKey && 
            (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 85 || 
             e.keyCode === 83 || e.keyCode === 73 || e.keyCode === 123)) {
            return false;
        }
    };

    document.onselectstart = function() { return false; };

    /* 2. CLEAN URL LOGIC */
    function cleanUrl() {
        if (window.location.pathname.endsWith("index.html")) {
            let newPath = window.location.pathname.replace("index.html", "");
            // Ensure root path stays valid
            if (newPath === "" || newPath.endsWith("/")) {
                newPath = window.location.pathname.split('index.html')[0];
            }
            let newUrl = newPath + window.location.search;
            window.history.replaceState(null, "", newUrl);
        }
    }
  </script>

  <style>
    /* ===== Global Reset & Protection ===== */
    * { box-sizing: border-box; }

    body {
        font-family: Arial, sans-serif;
        background-color: #F4F7F6;
        margin: 0;
        padding: 0;
        color: #333;
        overflow-x: hidden;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }

    img { pointer-events: none; -webkit-user-drag: none; }

    /* ===== Top Orange Navigation ===== */
    .top-header-nav {
      background-color: #FF6600; 
      padding: 12px 0;
      overflow-x: auto;
      white-space: nowrap;
      display: flex;
      scrollbar-width: none;
    }
    .top-header-nav::-webkit-scrollbar { display: none; }

    .nav-links-container { display: flex; gap: 12px; padding: 0 15px; }

    .nav-links-container a {
      text-decoration: none;
      color: #FF6600;
      background-color: white;
      font-weight: bold;
      font-size: 14px;
      padding: 8px 18px;
      border-radius: 5px;
    }

    /* ===== Channel Name Section ===== */
    .site-title-box {
      background-color: #FFFDE7;
      padding: 30px 10px;
      text-align: center;
      border-bottom: 4px solid #FFD600;
    }

    .site-title-box h1 {
      color: #FF6600; 
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }

    /* ===== Page Navigation Section ===== */
    .page-nav-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
      background: white;
    }

    .book-name-badge {
      background-color: #FF6600;
      color: white;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
    }

    .scroll-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .scroll-btn {
      background-color: #FF6600;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .numbers-wrapper {
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      gap: 8px;
      padding: 5px 15px;
      max-width: 80%;
      scrollbar-width: none;
    }
    .numbers-wrapper::-webkit-scrollbar { display: none; }

    .numbers-wrapper a {
      text-decoration: none;
      color: #FF6600;
      font-weight: bold;
      border: 1px solid #FF6600;
      padding: 7px 15px;
      border-radius: 4px;
    }

    .numbers-wrapper a.active { background-color: #FF6600; color: white; }

    /* ===== Main Content Card ===== */
    .main-content-card {
      max-width: 90%;
      width: 850px;
      margin: 50px auto;
      background-color: #FFFDE7;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      min-height: 350px;
      position: relative;
    }

    .badge-pos {
      display: flex;
      justify-content: center;
      margin-top: -55px;
      margin-bottom: 25px;
    }
    .round-badge {
      background-color: #FF6600;
      color: white;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      border: 4px solid #F4F7F6;
    }

    .page-text-content { 
      font-size: 20px; 
      text-align: center;
      color: #5C2E00; 
    }

    .page-text-content h2, 
    .page-text-content h3 {
      color: #FF6600; 
      font-size: 26px;
      margin: 20px 0;
      font-weight: bold;
    }

    .coming-soon-container {
      background-color: #FF6600;
      color: white;
      padding: 40px 15px;
      border-radius: 12px;
      text-align: center;
    }

    .bottom-nav { display: flex; justify-content: space-between; padding: 20px 0; }
    .nav-btn {
      background-color: #FF6600;
      color: white;
      text-decoration: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-weight: bold;
    }

    /* ===== Footer ===== */
    .footer {
      background-color: #0D1B3D;
      color: white;
      text-align: center;
      padding: 30px;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<nav class="top-header-nav">
  <div class="nav-links-container">
    <a href="https://csrgnk.github.io/manache-shlok/">Home</a>
    <a href="https://csrgnk.github.io/manache-shlok/hindi/">Hindi Version</a>
    <a href="https://csrgnk.github.io/Omnnbc/">Main Site</a>
    <a href="https://csrgnk.github.io/Dasabodha/">Dasabodha</a>
    <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
  </div>
</nav>

<div class="site-title-box">
  <h1>Namo Narayanaya<br>Bhakthi Channel</h1>
</div>

<div class="page-nav-section">
  <div class="book-name-badge">Manache Shlok (Telugu)</div>
  <div class="scroll-controls">
    <button class="scroll-btn" onclick="sideScroll(-150)">&#10094;</button>
    <div class="numbers-wrapper" id="pagination"></div>
    <button class="scroll-btn" onclick="sideScroll(150)">&#10095;</button>
  </div>
</div>

<main class="main-content-card">
  <div class="badge-pos">
    <div class="round-badge" id="current-page">1</div>
  </div>
  
  <div id="content" class="page-text-content">Loading Content...</div>
  <div class="bottom-nav" id="bottom-nav"></div>
</main>

<footer class="footer">
  © 2026 Namo Narayanaya Bhakthi Channel | All Rights Reserved
</footer>

<script>
const totalPages = 16;
const contentDiv = document.getElementById("content");
const paginationDiv = document.getElementById("pagination");
const pageBadge = document.getElementById("current-page");
const btmNav = document.getElementById("bottom-nav");

let page = new URLSearchParams(window.location.search).get("page") || 1;
page = parseInt(page);

function loadPage(p) {
  pageBadge.innerText = p;
  fetch("pages/page" + p + ".html")
    .then(res => { if (!res.ok) throw new Error(); return res.text(); })
    .then(data => { contentDiv.innerHTML = data; updateButtons(); })
    .catch(() => {
      contentDiv.innerHTML = `
        <div class="coming-soon-container">
          <h2 style="color:white">Coming Soon</h2>
          <p>Telugu content is being prepared.</p>
        </div>`;
      updateButtons();
    });
}

// Generate Clean Links
for (let i = 1; i <= totalPages; i++) {
  const a = document.createElement("a");
  a.href = "?page=" + i;
  a.innerText = i;
  if (i === page) a.className = "active";
  paginationDiv.appendChild(a);
}

function sideScroll(d) { paginationDiv.scrollBy({ left: d, behavior: 'smooth' }); }

function updateButtons() {
  btmNav.innerHTML = `
    ${page > 1 ? `<a href="?page=${page-1}" class="nav-btn">Previous</a>` : '<div></div>'}
    ${page < totalPages ? `<a href="?page=${page+1}" class="nav-btn">Next</a>` : '<div></div>'}
  `;
}

document.addEventListener("DOMContentLoaded", () => {
  cleanUrl(); 
  loadPage(page);
  const active = document.querySelector(".active");
  if (active) active.scrollIntoView({ behavior: "smooth", inline: "center" });
});
</script>

</body>
</html>
